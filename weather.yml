name: Weather Agent

on:
  schedule:
    # Morning report — 8 AM MST (3 PM UTC)
    - cron: "0 15 * * *"
    # Midday check — 12 PM MST (7 PM UTC)
    - cron: "0 19 * * *"
    # Afternoon update — 4 PM MST (11 PM UTC)
    - cron: "0 23 * * *"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  send-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx

      - name: Run weather agent
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          LAT: ${{ secrets.LAT }}
          LON: ${{ secrets.LON }}
          LOCATION_NAME: ${{ secrets.LOCATION_NAME }}
        run: python weather_agent.py
